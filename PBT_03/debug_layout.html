<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Layout</title>

    <link rel="stylesheet" href="debug_layout.css">
</head>
<body>

    <h1>Layout bị lỗi</h1>

    <div class="container broken">
        <div class="sidebar">Sidebar</div>
        <div class="content">Content</div>
    </div>

    <hr>

    <h1>Sửa bằng border-box</h1>

    <div class="container fix-border-box">
        <div class="sidebar">Sidebar</div>
        <div class="content">Content</div>
    </div>

    <hr>

    <h1>Sửa KHÔNG dùng border-box</h1>

    <div class="container fix-normal">
        <div class="sidebar">Sidebar</div>
        <div class="content">Content</div>
    </div>

</body>
</html>
