<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Lab</title>
    <link rel="stylesheet" href="boxmodel.css">
</head>
<body>
    <h1>PHẦN 1 </h1>

    <div class="box-wrapper">
        <div class="box content-box">
            <h2>Content Box</h2>
            <p>
                width: 300px <br>
                padding: 20px <br>
                border: 5px
            </p>
        </div>

        <div class="box border-box">
            <h2>Border Box</h2>
            <p>
                width: 300px <br>
                padding: 20px <br>
                border: 5px
            </p>
        </div>
    </div>
    <h1>PHẦN 2 </h1>

    <h2>Trường hợp KHÔNG dùng border-box</h2>

    <div class="container no-border-box">
        <div class="sidebar">Sidebar</div>
        <div class="content">Content</div>
        <div class="ads">Ads</div>
    </div>

    <h2>Trường hợp CÓ dùng border-box</h2>

    <div class="container with-border-box">
        <div class="sidebar">Sidebar</div>
        <div class="content">Content</div>
        <div class="ads">Ads</div>
    </div>
    <hr>
</body>
</html>
