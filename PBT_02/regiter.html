<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    
</head>
<body>
    <h2>Đăng kí tài khoản E-Commerce</h2>
    <form action="#" method="post">

        <fieldset>
            <langer>Thông tin cá nhân</langer>
                <label for="username" >Họ tên:</label>
                <input type="text" id="username" name="username" required minlength="2" maxlength="50"><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>

                <label for="tel">SDT:</label>
                <input type="tel" id="tel" name="tel" required pattern="[0-9]{10}"><br><br>

                <label for="datemax">Ngày sinh:</label>
                <input type="date" id="datemax" name="datemax"  max="30-04-2026" required><br><br>

        </fieldset>

        
        <fieldset>
            <langer>Tài khoản</langer>
                <label for="username" >Tên đăng nhập:</label>
                <input type="text" id="username" name="username" required minlength="2" maxlength="50"><br><br>

                <label for="passwordd">Mật khẩu:</label>
                <input type="password" id="passwordd" name="passwordd" required><br><br>

                <label for="password_confirm">Xác nhận mật khẩu:</label>
                <input type="password" id="password_confirm" name="password_confirm" required><br><br>

        </fieldset>
        
        <fieldset>
            <langer>Thông tin giao hàng</langer>
                <label for="select" >Thành phố:</label>
                <select id="select" name="select" required>
                    <option value="">Chọn thành phố</option>
                    <option value="hn">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="dn">Đà Nẵng</option>
                </select><br><br>

                <label for="district">Quận huyện:</label>
                <input type="text" id="district" name="district" required minlength="10" maxlength="200"><br><br>

                <label for="adress">Địa chỉ chi tiết:</label>
                <textarea id="adress" name="adress" required rows="3"></textarea><br><br>

                <p > Giới tính: </p>
                <label for ="nam">Nam</label>
                <input type="radio" name ="fav_" id ="nam" value ="nam">
                <label for ="nu">Nữ</label>
                <input type="radio" name ="fav_" id ="nu" value ="nu">
                <label for ="khac">Khác</label>
                <input type="radio" name ="fav_" id ="khac" value ="khac"><br><br>

        </fieldset>
        <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">Tôi đồng ý với điều khoản và điều kiện</label><br><br>
            
            <button type="submit">Đăng ký</button>
            <button type="reset">Reset</button>
    </form>
</body>
</html>
