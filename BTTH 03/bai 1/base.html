<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Quản Lí Sinh Viên</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="table.css">
    <link rel="stylesheet" href="btn.css">
</head>
<body>
    <div class="title">
        <h1>Quản lý Sinh Viên</h1>
    </div>
    <header class="navbar">
        <div class="box nav-box">
            <h3>Tổng số sinh viên: </h3>
            <p id="tong-sv">0</p>
        </div>
        <div class="box nav-box">
            <h3>Điểm Trung Bình: </h3>
            <p id="dtb-chung">0.0</p>
        </div>
    </header>

    <div id="alert-msg" style="text-align: center; color: yellow; font-weight: bold; margin-bottom: 10px;"></div>

    <div class="actions" style="margin-bottom: 20px;">
        <button type="button" id="them">Thêm sinh viên mới</button>
    </div>

    <div class="popup" id="popup">
        <form id="student-form">
            <h2 id="form-title">Thông Tin Sinh Viên</h2>
            <input type="hidden" id="form-mode" value="add">
            <input type="hidden" id="student-index" value="">

            <label for="msv">Mã Sinh Viên:</label>
            <input type="text" id="msv" required><br><br>

            <label for="fname">Họ và tên:</label>
            <input type="text" id="fname" required><br><br>

            <label for="nsinh">Ngày Sinh:</label>
            <input type="date" id="nsinh" max="2026-05-23" min="2000-01-01" required><br><br>

            <label for="lop">Lớp:</label>
            <select id="lop">
                <option value="66HTTT2">Lớp 66HTTT2</option>
                <option value="66HTTT1">Lớp 66HTTT1</option>
                <option value="66HTTT">Lớp 66HTTT</option>
            </select><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" required><br><br>

            <label for="dtb">Điểm Trung Bình:</label>
            <input type="number" id="dtb" min="0" max="10" step="0.1" required><br><br>

            <button type="submit" id="save-btn">Lưu lại</button>
            <button type="button" id="close">Đóng</button>
        </form>
    </div>

    <table border="1">
        <thead>
            <tr>
                <th>STT</th>
                <th>Mã Sinh Viên</th>
                <th>Tên</th>
                <th>Ngày Sinh</th>
                <th>Lớp</th>
                <th>Email</th>
                <th>Điểm Trung Bình</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="student-table-body">
            </tbody>
    </table>

    <script src="nt.js"></script>
</body>
</html>
