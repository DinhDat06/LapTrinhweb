<!DOCTYPE html>
<html lang = "vi">
<head>
    <title>Trang web</title>
    <meta charset="utf-8">
</head>
<body>

        <nav>
            <a href="#home">Trang chủ</a>

        </nav>

            <h3>Sản phẩm hot</h3>
            <img src="iphone.jpg" alt ="iPhone 16 Pro">

        <section id = "products">

            <table border = "1">
                <thead>
                    <tr>
                        <th>Tên</th>
                        <th>Giá</th>
                    </tr>

                    <tr>
                        <td>iPhone</td>
                        <td>25tr</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan ="2"> Sản phẩm còn bán</td>
                    </tr>
                </tfoot>
            </table>
        </section>
    </main>
    
    <aside>
        <p>Sidebar content</p>
    </aside>
    
    <footer>
        <p>Copyright 2026</p>
    </footer>
